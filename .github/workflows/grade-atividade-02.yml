name: Grade — Atividade 2 (Suíte Unitária RN)

on:
  pull_request_target:  # PRs de forks rodam sem aprovação manual

permissions:
  pull-requests: write
  contents: read

jobs:
  grade:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      # Descobre a pasta de entrega a partir dos arquivos do PR.
      # Qualquer pasta sob exercicios/02-setup-suite-unitaria/ (exceto starter/exemplo-resolvido).
      - id: discover
        uses: actions/github-script@v7
        with:
          script: |
            const files = await github.paginate(github.rest.pulls.listFiles, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
              per_page: 100,
            });
            const re = /^exercicios\/02-setup-suite-unitaria\/(?!starter\/|exemplo-resolvido\/)([^/]+)\//;
            const dirs = new Set();
            for (const f of files) {
              const m = f.filename.match(re);
              if (m) dirs.add(`exercicios/02-setup-suite-unitaria/${m[1]}`);
            }
            const list = [...dirs];
            if (list.length === 0) {
              core.setOutput('skip', 'true');
              core.info('PR não toca uma entrega da Atividade 2 — pulando.');
              return;
            }
            core.setOutput('skip', 'false');
            core.setOutput('entrega', list[0]);
            core.setOutput('login', (context.payload.pull_request.user.login || '').toLowerCase());
            core.info(`Entrega detectada: ${list[0]}`);

      - if: steps.discover.outputs.skip != 'true'
        uses: actions/setup-node@v4
        with: { node-version: 22 }

      - if: steps.discover.outputs.skip != 'true'
        working-directory: ./grader
        run: npm install

      - if: steps.discover.outputs.skip != 'true'
        working-directory: ./grader
        run: |
          npx tsx lib/validators/unit-coverage.ts \
            --entrega "../${{ steps.discover.outputs.entrega }}" \
            --output /tmp/grade.json \
            --student-login "${{ steps.discover.outputs.login }}" \
            --commit-sha "${{ github.event.pull_request.head.sha }}" || true

      - if: steps.discover.outputs.skip != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: grade-${{ steps.discover.outputs.login }}
          path: /tmp/grade.json
          retention-days: 30
          if-no-files-found: warn

      - if: steps.discover.outputs.skip != 'true'
        continue-on-error: true
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = '/tmp/grade.json';
            const entrega = '${{ steps.discover.outputs.entrega }}';
            if (!fs.existsSync(path)) {
              await github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: `## 🤖 J.A.R.V.I.S. — *autograder do Prof. Jackson*\n\n` +
                  `> *Just A Rather Very Intelligent System* — bot que roda as regras de avaliação automatizada do prof nos PRs de exercício.\n\n` +
                  `**Atividade 2 (Suíte Unitária RN)**\n\n` +
                  `❌ Não consegui avaliar a entrega em \`${entrega}\`. Confira se há \`package.json\` + arquivos de teste.`,
              });
              return;
            }
            const grade = JSON.parse(fs.readFileSync(path, 'utf8'));
            const lines = (grade.criteria || [])
              .map(c => `- ${c.earned >= c.weight ? '✅' : c.earned > 0 ? '🟡' : '⬜'} ${c.description} — ${c.publicNote || ''} (${c.earned}/${c.weight})`)
              .join('\n');
            const body = [
              `## 🤖 J.A.R.V.I.S. — *autograder do Prof. Jackson*`,
              ``,
              `> *Just A Rather Very Intelligent System* — bot que roda as regras de avaliação automatizada do prof nos PRs de exercício.`,
              ``,
              `**Atividade 2 (Suíte Unitária RN)** — entrega: \`${entrega}\``,
              ``,
              `**Status:** ${grade.pass ? '✅ Critérios mínimos automatizados atendidos' : '⚠️ Revisão manual necessária'}`,
              lines ? `\n${lines}` : '',
              ``,
              `Avaliação automatizada parcial. A **pontuação final** será lançada por mim (Prof. Jackson) **no Canvas** após revisão manual.`,
              ``,
              `### 🎥 Anexe um vídeo (≤ 2min)`,
              `Mostre \`npm test\` + \`npm run test:coverage\` rodando (suíte verde + relatório).`,
              `Cole o vídeo ou link (Loom/YouTube unlisted) na descrição deste PR.`,
              ``,
              `_Dúvidas? **Teams da turma** ou jackson.96@gmail.com._`,
            ].join('\n');
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body,
            });

      - if: steps.discover.outputs.skip != 'true'
        run: |
          if [ -f /tmp/grade.json ]; then
            PASS=$(cat /tmp/grade.json | grep -o '"pass":[^,]*' | head -1 | cut -d: -f2 | tr -d ' ')
            [ "$PASS" = "true" ] && exit 0 || exit 1
          else
            exit 1
          fi
