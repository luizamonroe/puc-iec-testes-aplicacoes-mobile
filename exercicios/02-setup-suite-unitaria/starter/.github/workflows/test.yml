name: Suite Unitaria (Atividade 2 - Testes Mobile)

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      - name: Rodar testes
        run: npm test -- --json --outputFile=results.json --passWithNoTests

      - name: Validar mínimo de testes
        run: |
          TESTS_PASSED=$(jq '.numPassedTests' results.json)
          TESTS_TOTAL=$(jq '.numTotalTests' results.json)
          echo "✅ Passou: $TESTS_PASSED / $TESTS_TOTAL"
          MIN_REQUIRED=14
          if [ "$TESTS_PASSED" -lt "$MIN_REQUIRED" ]; then
            echo "❌ Mínimo $MIN_REQUIRED testes verdes obrigatório (encontrado: $TESTS_PASSED)"
            echo "   Esperado: favoritesStore (6) + MovieCard RNTL (2) + isTokenError (5) + counterStore (3)"
            exit 1
          fi
          echo "✅ Atende mínimo de $MIN_REQUIRED testes"

      - name: Cobertura (store + utils ≥ 70%)
        run: npm run test:coverage -- --collectCoverageFrom='src/store/**' --collectCoverageFrom='src/utils/**'
